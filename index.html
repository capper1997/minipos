<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="GitWallet">
    <title>RNU Wallet</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h2>RNU Wallet</h2>
            <p class="login-error" id="login-error"></p>
            <form onsubmit="doLogin(); return false;">
                <input type="text" id="login-username" placeholder="Username" autocomplete="username">
                <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
    <div id="app">
        <div id="status-bar">Connecting...</div>
        <header class="app-header">
            <h1>RNU Wallet</h1>
            <select id="user-select" onchange="switchTrackUser()" title="Track for user"></select>
        </header>
        <div class="dashboard">
            <div class="card asset"><h3>Asset</h3><p id="total-asset">0.00 AED</p></div>
            <div class="card inc"><h3>Income</h3><p id="total-inc">0.00 AED</p></div>
            <div class="card exp"><h3>Expense</h3><p id="total-exp">0.00 AED</p></div>
        </div>
        <div class="dashboard">
            <div class="card balance" id="balance-card"><h3>Cash Balance</h3><p id="total-balance">0.00 AED</p></div>
        </div>
        <div class="category-section">
            <div class="list-header">By Category</div>
            <div id="category-list"></div>
        </div>
        <div class="input-group" id="add-transaction-form">
            <form id="tx-form" onsubmit="addTransaction(); return false;">
                <input type="date" id="t-date" required>
                <select id="type">
                    <option value="asset">Asset (-)</option>
                    <option value="income">Income (+)</option>
                    <option value="expense">Expense (-)</option>
                </select>
                <input type="text" id="category" placeholder="Category (e.g. Food)" list="cat-suggestions">
                <datalist id="cat-suggestions">
                    <option value="Food"><option value="Transport"><option value="Salary"><option value="Utilities"><option value="Entertainment">
                </datalist>
                <input type="number" id="amount" placeholder="Amount" step="0.01" inputmode="decimal" required>
                <input type="text" id="desc" placeholder="Description (optional)">
                <button id="add-btn" type="submit">Add Transaction</button>
            </form>
        </div>
        <div class="list-header">Recent Activity</div>
        <div id="history-list"></div>
        <div class="settings-btn" onclick="toggleSettings()">⚙</div>
        <div id="settings-modal">
            <div class="modal-content">
                <h2>GitHub Setup</h2>
                <p style="font-size:0.9rem; color:#666; margin-bottom: 15px;">Enter your details to sync data.</p>
                <input type="text" id="gh-username" placeholder="GitHub Username">
                <input type="text" id="gh-repo" placeholder="Repository Name">
                <input type="text" id="gh-filename" placeholder="Filename (e.g. data.json)" value="data.json">
                <input type="password" id="gh-token" placeholder="Personal Access Token (PAT)">
                <button onclick="saveSettings()">Save & Sync</button>
                <button onclick="logout()" style="background:#dc3545; margin-top:10px;">Logout</button>
                <button onclick="toggleSettings()" style="background:#eee; color:#333; margin-top:10px;">Close</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
